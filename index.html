<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEST</title>
</head>
<body>
  <div id="mapMount" style="padding:24px;font-size:32px;color:black;">
    LOADING...
  </div>

  <script type="module">
  const mount = document.getElementById('mapMount');
  mount.textContent = 'LOADING MAIN...';

  import('./main.js?v=' + Date.now())
    .then(() => {
      mount.textContent = 'MAIN IMPORT OK';
    })
    .catch((err) => {
      mount.innerHTML = `
        <pre style="white-space:pre-wrap;color:#ff8a8a;padding:24px;font-size:18px;">
${err?.stack || err?.message || String(err)}
        </pre>
      `;
    });
</script>
</body>
</html>
