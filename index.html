<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shrouded Front</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="titleBlock">
        <h1>Shrouded Front</h1>
        <p>지휘소에서 들어오는 보고를 바탕으로 작전하는 실시간 전술 프로토타입</p>
      </div>

      <div class="controls">
        <button id="pauseBtn" class="btn primary">Pause</button>
        <button class="btn speedBtn active" data-speed="0.5">0.5x</button>
        <button class="btn speedBtn" data-speed="1">1x</button>
        <button class="btn speedBtn" data-speed="2">2x</button>
        <button class="btn speedBtn" data-speed="4">4x</button>
        <button id="openOperationsBtn" class="btn">작전판</button>
      </div>
    </header>

    <main class="layout">
      <section class="mapWrap">
        <div class="mapHeader">
          <div>전술 지도</div>
          <div class="mapHint">탭/호버로 구역 상세 보기 · 알림 발생 시 빨간 핀 표시</div>
        </div>
        <div id="mapMount" class="mapMount"></div>
      </section>

      <aside class="sidePanel">
        <section class="panel">
          <h2>신규 보고</h2>
          <div id="alertsPanel" class="alerts"></div>
        </section>

        <section class="panel">
          <h2>지역 정보</h2>
          <div id="detailPanel" class="details">
            지역을 선택하면 작전 정보가 표시된다.
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div id="operationsModal" class="modal hidden" aria-hidden="true">
    <div class="modalCard">
      <div class="modalHeader">
        <h2>작전판</h2>
        <button id="closeOperationsBtn" class="btn">닫기</button>
      </div>
      <div class="modalBody">
        <div id="operationsPanel"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
